<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babelcom - Internet of Babel Control Panel</title>
    <link rel="stylesheet" href="/static/styles.css">
    <script src="/static/winbox.bundle.js"></script>
</head>
<body>
    <!-- Boot screen — painted before everything, dismissed by app.js -->
    <div class="boot-screen" id="bootScreen">
        <div class="boot-content">
            <div class="boot-logo">✨ BABELCOM</div>
            <div class="boot-sub">COMPUTER OF BABEL CONTROL SYSTEM</div>
            <div class="boot-log" id="bootLog"></div>
            <div class="boot-progress"><div class="boot-progress-fill"></div></div>
            <div class="boot-hint">click to skip</div>
        </div>
    </div>

    <div class="desktop">
        <!-- Desktop Background. Swap which of these is uncommented to switch
             between stills and looping videos. -->
        <video class="desktop-background-video" autoplay muted loop playsinline>
            <source src="/static/wallpaper/353633_medium.mp4" type="video/mp4">
        </video>
        <!--
        <video class="desktop-background-video" autoplay muted loop playsinline>
            <source src="/static/wallpaper.mp4" type="video/mp4">
        </video>
        <img class="desktop-background-video" src="/static/wallpaper/wp1895678-vaporwave-wallpapers.jpg" alt="">
        <img class="desktop-background-video" src="/static/wallpaper/wp1871949-magenta-wallpapers.png" alt="">
        <img class="desktop-background-video" src="/static/asadal_stock_7.jpg" alt="">
        -->
        <div class="desktop-background-overlay"></div>
        
        <!-- Taskbar -->
        <div class="taskbar">
            <div class="taskbar-left">
                <div class="start-button" data-tianji-event="click-start-button" onclick="toggleStartMenu()">
                    <span class="start-icon">✨</span>
                    <span class="start-text">BABELCOM</span>
                </div>
            </div>
            <div class="taskbar-center">
                <div class="running-apps" id="runningApps">
                    <!-- Running app windows will be shown here -->
                </div>
            </div>
            <div class="taskbar-right">
                <div class="system-tray">
                    <div class="taskbar-metric" id="taskbarMetric">
                        <span class="taskbar-metric-icon" id="taskbarMetricIcon"></span>
                        <span class="taskbar-metric-value" id="taskbarMetricValue">--</span>
                    </div>
                    <div class="clock" id="clock"></div>
                    <div class="status-indicator" id="statusIndicator">
                        <span class="status-dot"></span>
                        <span class="status-text">SYSTEM ONLINE</span>
                    </div>
                    <div class="taskbar-fullscreen" id="taskbarFullscreen" title="Toggle fullscreen" data-tianji-event="toggle-app-fullscreen" onclick="toggleAppFullscreen()">
                        <img src="/static/icons/icons8-fullscreen-96.png" alt="Fullscreen">
                    </div>
                </div>
            </div>
        </div>

        <!-- Start Menu -->
        <div class="start-menu" id="startMenu">
            <div class="start-menu-header">
                <h3>Applications</h3>
            </div>
            <div class="start-menu-apps">
                <div class="app-item" data-tianji-event="open-system-monitor-from-start-menu" onclick="openApp('system-monitor')">
                    <img class="app-icon" src="/static/icons/icons8-control-panel-100.png" alt="">
                    <div class="app-name">System Monitor</div>
                </div>
                <div class="app-item" data-tianji-event="open-web-browser-from-start-menu" onclick="openApp('library-browser')">
                    <img class="app-icon" src="/static/icons/icons8-web-94.png" alt="">
                    <div class="app-name">Wikibabel</div>
                </div>
                <div class="app-item" data-tianji-event="open-radio-from-start-menu" onclick="openApp('radio')">
                    <img class="app-icon" src="/static/icons/icons8-radio-94.png" alt="">
                    <div class="app-name">Radio</div>
                </div>
                <div class="app-item" data-tianji-event="open-writer-from-start-menu" onclick="openApp('writer')">
                    <img class="app-icon" src="/static/icons/icon_clippy.png" alt="">
                    <div class="app-name">Writer</div>
                </div>

                <div class="start-menu-divider"></div>
                <div class="app-item" data-tianji-event="restart-babelcom" onclick="restartBabelcom()">
                    <div class="app-icon">🔄</div>
                    <div class="app-name">Restart</div>
                </div>

            </div>
        </div>

        <!-- Desktop Icons -->
        <div class="desktop-icons">
            <div class="desktop-icon" data-tianji-event="open-system-monitor-from-desktop" onclick="openApp('system-monitor')">
                <img class="icon" src="/static/icons/icons8-control-panel-100.png" alt="">
                <div class="icon-label">System Monitor</div>
            </div>
            <div class="desktop-icon" data-tianji-event="open-web-browser-from-desktop" onclick="openApp('library-browser')">
                <img class="icon" src="/static/icons/icons8-web-94.png" alt="">
                <div class="icon-label">Wikibabel</div>
            </div>
            <div class="desktop-icon" data-tianji-event="open-radio-from-desktop" onclick="openApp('radio')">
                <img class="icon" src="/static/icons/icons8-radio-94.png" alt="">
                <div class="icon-label">Radio</div>
            </div>
            <div class="desktop-icon" data-tianji-event="open-writer-from-desktop" onclick="openApp('writer')">
                <img class="icon" src="/static/icons/icon_clippy.png" alt="">
                <div class="icon-label">Writer</div>
            </div>
            <div class="desktop-icon" data-tianji-event="open-welcome-from-desktop" onclick="openApp('welcome')">
                <img class="icon" src="/static/icons/icons8-eyes-94.png" alt="">
                <div class="icon-label">Start</div>
            </div>
        </div>

        <!-- Window Container -->
        <div id="windowContainer"></div>
    </div>

    <script src="/static/vendor/marked.min.js"></script>
    <script src="/static/app.js"></script>
    <script src="/static/apps/system-monitor.js"></script>
    <script src="/static/apps/library-browser.js"></script>
    <script src="/static/apps/radio.js"></script>
    <script src="/static/apps/welcome.js"></script>
    <script src="/static/apps/writer.js"></script>
    <script type="module" src="/static/clippy-init.js"></script>
    <script async defer src="https://tianji.johncave.co.nz/tracker.js" data-website-id="cmcwlnyrd000168v5crqedchd"></script>
</body>
</html>
