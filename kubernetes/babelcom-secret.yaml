apiVersion: v1
kind: Secret
metadata:
  name: babelcom-api-key
  namespace: internet-of-babel
type: Opaque
data:
  # Base64 encoded API key - replace with your actual key
  # echo -n "your-secret-key-here" | base64
  api-key: YmFiZWxjb20tc2VjcmV0LWtleQ==
  # OpenRouter API key for backend Clippy (CLIPPY_BACKEND=openrouter).
  # Empty by default → Clippy stays disabled until set. Do NOT commit a real
  # key here; set it out-of-band (see below) or use a sealed/external secret.
  # echo -n "sk-or-..." | base64
  openrouter-api-key: "" 